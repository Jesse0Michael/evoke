# Evoke documentation site.
#
# Built with the Just the Docs theme via GitHub Pages' native Jekyll build —
# no GitHub Actions or local toolchain required. To publish: repository
# Settings -> Pages -> Source: "Deploy from a branch", Branch: main, Folder: /docs.

title: Evoke
description: A declarative, composable source format and compiler for AI characters and generative assets.

# Served as a project page at https://<user>.github.io/evoke.
url: https://jesse0michael.github.io
baseurl: /evoke

# Just the Docs is pulled in as a remote theme, so nothing is vendored into the
# repo. jekyll-remote-theme is on the GitHub Pages plugin allowlist.
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Theme options.
color_scheme: dark
search_enabled: true
search:
  heading_level: 2
  previews: 3
heading_anchors: true

# Styled callouts used across the docs ({: .note } / {: .warning } blockquotes).
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Watch out
    color: red

# Link back to the repo from the sidebar footer and each page.
aux_links:
  "GitHub":
    - "https://github.com/jesse0michael/evoke"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_repository: "https://github.com/jesse0michael/evoke"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Keep Jekyll from trying to build stray files.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
